<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Sheet (Synced)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@200;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- YOUR CUSTOM CSS FILE -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

        <!-- Header -->
        <header class="flex flex-wrap items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: var(--income-soft);">
                    <i class="fa-solid fa-scale-balanced" style="color:var(--income)"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Balance Sheet</h1>
                    <p class="text-xs" style="color:var(--text-muted)">Synced from Orders DB</p>
                </div>
            </div>

            <div class="flex items-center gap-3 flex-wrap">
                <!-- Month Navigator -->
                <div class="flex items-center gap-1 px-2 py-1 rounded-lg" style="background:var(--bg-card);border:1px solid var(--border);">
                    <button class="w-8 h-8 flex items-center justify-center rounded-md hover:bg-[var(--bg-primary)] transition" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left text-xs" style="color:var(--text-secondary)"></i></button>
                    <span id="monthLabel" class="px-3 text-sm font-medium font-display" style="color:var(--text-primary);min-width:120px;text-align:center;"></span>
                    <button class="w-8 h-8 flex items-center justify-center rounded-md hover:bg-[var(--bg-primary)] transition" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right text-xs" style="color:var(--text-secondary)"></i></button>
                </div>

                <!-- Sync Button -->
                <button id="syncBtn" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:brightness-110"
                    style="background:var(--income-soft);border:1px solid rgba(16,185,129,0.2);color:var(--income);"
                    onclick="manualSync()">
                    <i class="fa-solid fa-arrows-rotate text-xs"></i>
                    <span>Sync Orders</span>
                </button>

                <!-- Save Status Indicator -->
                <div class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs" style="background:var(--bg-card);border:1px solid var(--border);">
                    <div id="saveDot" class="save-dot saved"></div>
                    <span id="saveLabel" style="color:var(--text-muted)">All saved</span>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-grid grid grid-cols-3 gap-4 mb-8">
            <div class="summary-card">
                <div class="accent-bar" style="background:var(--income)"></div>
                <p class="text-xs font-medium mb-1" style="color:var(--text-muted)">TOTAL INCOME</p>
                <p id="totalIncome" class="text-2xl font-bold font-display" style="color:var(--income)">NPR 0</p>
            </div>
            <div class="summary-card">
                <div class="accent-bar" style="background:var(--expense)"></div>
                <p class="text-xs font-medium mb-1" style="color:var(--text-muted)">TOTAL EXPENSES</p>
                <p id="totalExpense" class="text-2xl font-bold font-display" style="color:var(--expense)">NPR 0</p>
            </div>
            <div class="summary-card">
                <div class="accent-bar" style="background:var(--balance)"></div>
                <p class="text-xs font-medium mb-1" style="color:var(--text-muted)">NET BALANCE</p>
                <p id="netBalance" class="text-2xl font-bold font-display" style="color:var(--balance)">NPR 0</p>
            </div>
        </div>

        <!-- Main Panel -->
        <div class="panel">
            <!-- PANEL HEADER WITH ADD BUTTONS -->
            <div class="panel-header">
                <h2 class="text-sm font-bold font-display" style="color:var(--text-primary)">ENTRIES</h2>
                
                <!-- RESTORED ADD BUTTONS -->
                <div class="flex gap-2">
                    <button onclick="addIncomeEntry()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition hover:brightness-110"
                        style="background:var(--income-soft);color:var(--income);border:1px solid rgba(16,185,129,0.15);">
                        <i class="fa-solid fa-plus text-[10px]"></i> Income
                    </button>
                    <button onclick="addExpenseEntry()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition hover:brightness-110"
                        style="background:var(--expense-soft);color:var(--expense);border:1px solid rgba(244,63,94,0.15);">
                        <i class="fa-solid fa-plus text-[10px]"></i> Expense
                    </button>
                </div>
            </div>

            <div class="flex main-split" style="min-height: 500px;">
                
                <!-- INCOME SIDE -->
                <div class="split-col">
                    <!-- The JS injects the Table Header and Rows here -->
                    <div id="incomeEntries"></div>
                    
                    <div class="px-5 py-3 items-center flex justify-between" style="border-top: 2px solid var(--border); background:rgba(16,185,129,0.03);">
                        <span class="text-xs font-bold tracking-wider" style="color:var(--text-muted)">TOTAL</span>
                        <span id="incomeTotalInline" class="text-sm font-bold font-display" style="color:var(--income)">NPR 0</span>
                    </div>
                </div>

                <!-- EXPENSE SIDE -->
                <div class="col-divider"></div>
                <div class="split-col">
                    <!-- The JS injects the Table Header and Rows here -->
                    <div id="expenseEntries"></div>
                    
                    <div class="px-5 py-3 items-center flex justify-between" style="border-top: 2px solid var(--border); background:rgba(244,63,94,0.03);">
                        <span></span>
                        <span class="text-xs font-bold tracking-wider" style="color:var(--text-muted)">TOTAL</span>
                        <span id="expenseTotalInline" class="text-sm font-bold font-display text-right" style="color:var(--expense)">NPR 0</span>
                        <span></span>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- YOUR CUSTOM JS FILE -->
    <script src="js/app.js"></script>
</body>
</html>
